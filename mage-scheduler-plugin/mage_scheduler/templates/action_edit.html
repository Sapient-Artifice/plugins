{% extends "base.html" %}

{% block title %}Edit Action — Mage Scheduler{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Edit Action</h1>
</div>

{% if error %}
    <div class="error-msg">{{ error }}</div>
{% endif %}

<form action="/actions/{{ action.id }}/edit" method="post">
    <fieldset>
        <legend>Identity</legend>
        <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required value="{{ form.name if form else action.name }}">
        </div>
        <div class="field">
            <label for="description">Description</label>
            <input id="description" name="description" type="text" value="{{ form.description if form else (action.description or '') }}">
        </div>
        <div class="field">
            <label for="command">Command</label>
            <input id="command" name="command" type="text" required value="{{ form.command if form else action.command }}">
        </div>
        <div class="field">
            <label for="default_cwd">Default Working Directory</label>
            <input id="default_cwd" name="default_cwd" type="text" value="{{ form.default_cwd if form else (action.default_cwd or '') }}">
        </div>
    </fieldset>

    <fieldset>
        <legend>Permissions</legend>
        <div class="field">
            <label for="allowed_env">Allowed Env Vars <span style="font-weight:normal;text-transform:none;letter-spacing:0">(comma-separated)</span></label>
            <input id="allowed_env" name="allowed_env" type="text" value="{{ form.allowed_env if form else ((action.allowed_env or []) | join(', ')) }}">
        </div>
        <div class="field">
            <label for="allowed_command_dirs">Allowed Command Dirs <span style="font-weight:normal;text-transform:none;letter-spacing:0">(comma-separated)</span></label>
            <input id="allowed_command_dirs" name="allowed_command_dirs" type="text" value="{{ form.allowed_command_dirs if form else ((action.allowed_command_dirs or []) | join(', ')) }}">
        </div>
        <div class="field">
            <label for="allowed_cwd_dirs">Allowed CWD Dirs <span style="font-weight:normal;text-transform:none;letter-spacing:0">(comma-separated)</span></label>
            <input id="allowed_cwd_dirs" name="allowed_cwd_dirs" type="text" value="{{ form.allowed_cwd_dirs if form else ((action.allowed_cwd_dirs or []) | join(', ')) }}">
        </div>
    </fieldset>

    <fieldset>
        <legend>Retry</legend>
        <div class="field">
            <label for="max_retries">Max Retries</label>
            <input id="max_retries" name="max_retries" type="number" min="0" max="10" value="{{ form.max_retries if form else action.max_retries }}" style="width:100px">
            <div class="hint">Retry count on failure (0 = no retry)</div>
        </div>
        <div class="field">
            <label for="retry_delay">Retry Delay (seconds)</label>
            <input id="retry_delay" name="retry_delay" type="number" min="1" value="{{ form.retry_delay if form else action.retry_delay }}" style="width:100px">
            <div class="hint">Seconds between retry attempts</div>
        </div>
    </fieldset>

    <div class="form-actions">
        <button type="submit" class="btn-primary">Save Changes</button>
        <a href="/actions" class="btn">Cancel</a>
    </div>
</form>
{% endblock %}
